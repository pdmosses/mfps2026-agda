site_name: MFPS2026-Agda
site_url: https://pdmosses.github.io/mfps2026-agda/
repo_name: pdmosses/mfps2026-agda
repo_url: https://github.com/pdmosses/mfps2026-agda

# To deploy website versions:
# - install mike (https://github.com/jimporter/mike/)
# - uncomment the following lines:
# extra:
#   version:
#     provider: mike

use_directory_urls: true

theme:
  name: material
  font: false
  palette: 
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/lightbulb 
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/lightbulb-outline
        name: Switch to light mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/lightbulb-auto
        name: Switch to light mode

  features:
    - content.code.copy
    # - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.progress
    - navigation.path
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - search.highlight
    - search.share
    - search.suggest

extra_css:
# KaTeX:
  - https://unpkg.com/katex@0/dist/katex.min.css
# Agda:
  - stylesheets/Agda-material.css
  - stylesheets/Agda-md.css
  - stylesheets/Agda-md-dark.css

extra_javascript:
# KaTeX:
  - javascripts/katex.js
  - https://unpkg.com/katex@0/dist/katex.min.js
  - https://unpkg.com/katex@0/dist/contrib/auto-render.min.js
# Agda:
  - javascripts/highlight-hover.js

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.superfences
  - pymdownx.tasklist:
      custom_checkbox: true
  - tables
  - pymdownx.tilde

plugins:
  - awesome-nav
  - search